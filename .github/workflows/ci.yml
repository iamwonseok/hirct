# HIRCT CI Pipeline
name: HIRCT CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: bash utils/setup-env.sh

      - name: Build
        run: make build

      - name: Unit tests (lit)
        run: ninja -C build check-hirct

      - name: Unit tests (gtest)
        run: ninja -C build check-hirct-unit
        continue-on-error: true

      - name: Integration tests
        run: |
          if [ -d integration_test/smoke ]; then
            lit -sv integration_test/smoke/
          fi
        continue-on-error: true

      - name: Lint
        run: make lint
        continue-on-error: true
